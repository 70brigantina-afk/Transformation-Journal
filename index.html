<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transformation Journal</title>
  <link rel="stylesheet" href="styles.css">
  <script>
    (function () {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>
  <main class="journal">
    <header class="journal__header">
      <h1 class="journal__title">Transformation Journal</h1>
      <p class="journal__subtitle">Записывайте мысли, отслеживайте изменения</p>
    </header>

    <section class="journal__entry">
      <label class="journal__label" for="entry-text">Сегодня</label>
      <textarea
        id="entry-text"
        class="journal__textarea"
        placeholder="Что изменилось сегодня?"
        rows="8"
      ></textarea>
    </section>
  </main>

  <button
    class="theme-toggle"
    id="theme-toggle"
    type="button"
    aria-label="Переключить на тёмную тему"
    title="Переключить тему"
  >
  <span class="theme-toggle__track" aria-hidden="true">
    <span class="theme-toggle__thumb"></span>
    <span class="theme-toggle__icon theme-toggle__icon--sun">☀️</span>
    <span class="theme-toggle__icon theme-toggle__icon--moon">🌙</span>
  </span>
  </button>

  <script src="app.js"></script>
</body>
</html>
